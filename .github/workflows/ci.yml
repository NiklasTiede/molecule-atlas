name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --dev
      - name: Check formatting
        working-directory: backend
        run: uv run ruff format --check .
      - name: Lint
        working-directory: backend
        run: uv run ruff check .
      - name: Type check
        working-directory: backend
        run: uv run pyright
      - name: Test
        working-directory: backend
        run: uv run pytest
      - name: Verify generated evidence schema
        working-directory: backend
        run: uv run molecule-atlas schema --output ../schemas/run-manifest/0.1.0.schema.json && git diff --exit-code -- ../schemas/run-manifest/0.1.0.schema.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Verify generated API types
        working-directory: frontend
        run: npm run generate:api && git diff --exit-code -- openapi.json src/types/openapi.d.ts
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --dev
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        working-directory: frontend
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

  containers:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Verify container configuration
        run: make container-config-test
      - name: Build and smoke test containers
        run: make container-smoke
